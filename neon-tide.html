      function magJump() {
        if (state.mode !== "playing") {
          return;
        }
        if (Math.abs(magRun.y - magRun.groundY) < 2) {
          magRun.vy = -680;
          magRun.ducking = false;
          playTone(430, 0.045, "triangle", 0.025);
        }
      }

      function setMagDucking(value) {
        if (state.mode !== "playing") {
          return;
        }
        magRun.ducking = value && Math.abs(magRun.y - magRun.groundY) < 4;
      }

      function spawnMagObject() {
        const config = getDifficulty();
        const speed = (330 + state.elapsed * 5.4) * config.hazardSpeed;
        const type = Math.random() > 0.48 ? "barrier" : "gate";
        magRun.objects.push({
          type,
          x: state.w + 56,
          y: type === "barrier" ? magRun.groundY - 44 : magRun.groundY - 100,
          w: type === "barrier" ? 34 : 58,
          h: type === "barrier" ? 44 : 30,
          speed,
          scored: false,
          pulse: rand(0, Math.PI * 2),
        });
        if (Math.random() > 0.35) {
          magRun.objects.push({
            type: "charge",
            x: state.w + rand(130, 230),
            y: magRun.groundY - (type === "barrier" ? rand(96, 135) : rand(48, 72)),
            w: 22,
            h: 22,
            speed: speed * 0.98,
            scored: false,
            pulse: rand(0, Math.PI * 2),
          });
        }
      }

      function getMagPlayerRect() {
        const height = magRun.ducking ? 28 : 54;
        const width = magRun.ducking ? 58 : 42;
        return {
          x: magRun.x - width * 0.5,
          y: magRun.y - height,
          w: width,
          h: height,
        };
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function updateMagRun(dt) {
        const config = getDifficulty();
        state.elapsed += dt;
        state.timeLeft -= dt;
        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        state.burst = Math.max(0, state.burst - dt);
        magRun.groundY = state.h * 0.68;
        magRun.x = state.w * 0.22;
        magRun.distance += dt * (340 + state.elapsed * 5);

        magRun.vy += 1760 * dt;
        magRun.y += magRun.vy * dt;
        if (magRun.y >= magRun.groundY) {
          magRun.y = magRun.groundY;
          magRun.vy = 0;
        } else {
          magRun.ducking = false;
        }

        magRun.spawn -= dt;
        if (magRun.spawn <= 0) {
          spawnMagObject();
          magRun.spawn = Math.max(0.46, (0.96 - state.elapsed * 0.005) * config.hazardInterval);
        }

        const playerRect = getMagPlayerRect();
        for (let i = magRun.objects.length - 1; i >= 0; i -= 1) {
          const object = magRun.objects[i];
          object.x -= object.speed * dt;
          object.pulse += dt * 6;
          if (object.type === "charge") {
            const distance = Math.hypot(object.x - magRun.x, object.y - (magRun.y - 30));
            if (distance < 34) {
              state.score += 22 * state.combo * config.scoreMultiplier;
              state.combo = Math.min(config.comboCap, state.combo + 1);
              state.maxCombo = Math.max(state.maxCombo, state.combo);
              state.energy = clamp(state.energy + 19 * config.energyGain, 0, 100);
              state.shield = clamp(state.shield + config.shieldGain, 0, config.shield);
              createRipple(object.x, object.y, "#ffd166", 54);
              addParticles(object.x, object.y, "#ffd166", 12, 1);
              playTone(720, 0.05, "sine", 0.03);
              magRun.objects.splice(i, 1);
            } else if (object.x < -80) {
              magRun.objects.splice(i, 1);
            }
            continue;
          }

          const objectRect = { x: object.x - object.w * 0.5, y: object.y, w: object.w, h: object.h };
          if (rectsOverlap(playerRect, objectRect)) {
            state.shield -= config.damage;
            state.combo = 1;
            state.screenShake = 10;
            createRipple(magRun.x, magRun.y - 30, "#ff4d6d", 78);
            addParticles(magRun.x, magRun.y - 30, "#ff4d6d", 18, 1.25);
            playTone(135, 0.15, "sawtooth", 0.055);
            magRun.objects.splice(i, 1);
            if (state.shield <= 0) {
              finishRun("over");
              return;
            }
          } else if (object.x + object.w < magRun.x && !object.scored) {
            object.scored = true;
            state.score += 7 * state.combo * config.scoreMultiplier;
          } else if (object.x < -100) {
            magRun.objects.splice(i, 1);
          }
        }

        state.best = Math.max(state.best, Math.round(state.score));
        if (state.timeLeft <= 0) {
          finishRun("win");
        }
      }

      function activateMagBurst() {
        if (state.mode !== "playing" || state.energy < 100) {
          return;
        }
        const config = getDifficulty();
        state.energy = 0;
        state.burst = 0.45;
        state.screenShake = Math.max(state.screenShake, 7);
        createRipple(magRun.x, magRun.y - 28, "#ffd166", 230);
        for (let i = magRun.objects.length - 1; i >= 0; i -= 1) {
          const object = magRun.objects[i];
          if (object.type !== "charge" && object.x > magRun.x - 40 && object.x < state.w + 80) {
            addParticles(object.x, object.y + object.h * 0.5, "#ffd166", 12, 1.2);
            magRun.objects.splice(i, 1);
            state.score += 8 * state.combo * config.scoreMultiplier;
          }
        }
        playTone(610, 0.1, "triangle", 0.055);
        updateHud();
      }

      function drawMagRun(time) {
        if (magRun.x <= 0 || state.mode === "menu") {
          magRun.x = state.w * 0.22;
          magRun.groundY = state.h * 0.68;
          magRun.y = magRun.groundY;
        }
        drawBackground(time);
        const ground = magRun.groundY;
        ctx.save();
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(78, 240, 209, 0.7)";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#4ef0d1";
        ctx.beginPath();
        ctx.moveTo(20, ground);
        ctx.lineTo(state.w - 20, ground);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(255, 209, 102, 0.28)";
        ctx.setLineDash([12, 18]);
        ctx.lineDashOffset = -magRun.distance * 0.08;
        ctx.beginPath();
        ctx.moveTo(20, ground + 22);
        ctx.lineTo(state.w - 20, ground + 22);
        ctx.stroke();
        ctx.setLineDash([]);

        for (let i = 0; i < 18; i += 1) {
          const x = ((i * 110 - magRun.distance * 0.36) % (state.w + 160)) - 80;
          ctx.globalAlpha = 0.24;
          ctx.fillStyle = "#b7f1ff";
          ctx.fillRect(x, ground + 33, 42, 3);
        }
        ctx.globalAlpha = 1;
        ctx.restore();

        for (const object of magRun.objects) {
          ctx.save();
          if (object.type === "charge") {
            ctx.translate(object.x, object.y);
            ctx.rotate(Math.PI / 4 + object.pulse * 0.2);
            ctx.shadowBlur = 18;
            ctx.shadowColor = "#ffd166";
            ctx.fillStyle = "#ffd166";
            ctx.strokeStyle = "rgba(255, 255, 255, 0.76)";
            ctx.lineWidth = 1.3;
            ctx.fillRect(-object.w * 0.5, -object.w * 0.5, object.w, object.w);
            ctx.strokeRect(-object.w * 0.5, -object.w * 0.5, object.w, object.w);
          } else if (object.type === "barrier") {
            ctx.shadowBlur = 16;
            ctx.shadowColor = "#ff4d6d";
            ctx.fillStyle = "rgba(255, 77, 109, 0.24)";
            ctx.strokeStyle = "#ff6f91";
            ctx.lineWidth = 2;
            ctx.fillRect(object.x - object.w * 0.5, object.y, object.w, object.h);
            ctx.strokeRect(object.x - object.w * 0.5, object.y, object.w, object.h);
          } else {
            ctx.shadowBlur = 16;
            ctx.shadowColor = "#ff4d6d";
            ctx.fillStyle = "rgba(255, 77, 109, 0.18)";
            ctx.strokeStyle = "#ff6f91";
            ctx.lineWidth = 2;
            ctx.fillRect(object.x - object.w * 0.5, object.y, object.w, object.h);
            ctx.strokeRect(object.x - object.w * 0.5, object.y, object.w, object.h);
            ctx.fillStyle = "#ff4d6d";
            ctx.fillRect(object.x - object.w * 0.24, object.y + object.h * 0.45, object.w * 0.48, 4);
          }
          ctx.restore();
        }

        drawEffects();

        const playerRect = getMagPlayerRect();
        ctx.save();
        ctx.shadowBlur = state.burst > 0 ? 28 : 18;
        ctx.shadowColor = state.burst > 0 ? "#ffd166" : "#4ef0d1";
        ctx.fillStyle = "#eafffb";
        ctx.strokeStyle = "#4ef0d1";
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (magRun.ducking) {
          ctx.roundRect(playerRect.x, playerRect.y + 4, playerRect.w, playerRect.h, 6);
        } else {
          ctx.moveTo(magRun.x + 20, magRun.y - 28);
          ctx.lineTo(magRun.x - 10, magRun.y - 54);
          ctx.lineTo(magRun.x - 18, magRun.y - 8);
          ctx.lineTo(magRun.x + 18, magRun.y - 8);
          ctx.closePath();
        }
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#ff6f91";
        ctx.fillRect(magRun.x - 28, magRun.y - 4, 58, 7);
        ctx.fillStyle = "#061018";
        ctx.beginPath();
        ctx.arc(magRun.x + 3, magRun.ducking ? magRun.y - 12 : magRun.y - 30, 4.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (state.burst > 0) {
          const progress = 1 - state.burst / 0.45;
          ctx.save();
          ctx.globalAlpha = (1 - progress) * 0.22;
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.arc(magRun.x, magRun.y - 28, 230 * progress, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function cloneLightSolution() {
        const size = lightRoute.size;
        const grid = Array.from({ length: size }, () => Array(size).fill(0));
        grid[2][1] = 2;
        grid[3][1] = 2;
        grid[3][3] = 1;
        grid[2][3] = 1;
        grid[0][0] = 1;
        grid[1][2] = 2;
        grid[4][2] = 1;
        grid[1][4] = 2;
        return grid;
      }

      function getLightBoardMetrics() {
        const board = Math.min(state.w * 0.72, state.h * 0.5, 420);
        const cell = Math.max(44, board / lightRoute.size);
        const total = cell * lightRoute.size;
        lightRoute.cell = cell;
        lightRoute.boardX = (state.w - total) * 0.5;
        lightRoute.boardY = Math.max(122, (state.h - total) * 0.52);
      }

      function turnLightDirection(direction, tile) {
        if (tile === 1) {
          return [3, 2, 1, 0][direction];
        }
        if (tile === 2) {
          return [1, 0, 3, 2][direction];
        }
        return direction;
      }

      function traceLightRoute() {
        getLightBoardMetrics();
        const dx = [1, 0, -1, 0];
        const dy = [0, 1, 0, -1];
        let col = -1;
        let row = lightRoute.startRow;
        let direction = 0;
        const points = [{
          x: lightRoute.boardX - lightRoute.cell * 0.42,
          y: lightRoute.boardY + (row + 0.5) * lightRoute.cell,
        }];
        let solved = false;
        for (let step = 0; step < 40; step += 1) {
          col += dx[direction];
          row += dy[direction];
          if (col < 0 || col >= lightRoute.size || row < 0 || row >= lightRoute.size) {
            const last = points[points.length - 1];
            points.push({
              x: col >= lightRoute.size ? lightRoute.boardX + lightRoute.size * lightRoute.cell + lightRoute.cell * 0.42 : last.x + dx[direction] * lightRoute.cell * 0.92,
              y: row === lightRoute.targetRow ? lightRoute.boardY + (lightRoute.targetRow + 0.5) * lightRoute.cell : last.y + dy[direction] * lightRoute.cell * 0.92,
            });
            solved = col >= lightRoute.size && row === lightRoute.targetRow && direction === 0;
            break;
          }
          const center = {
            x: lightRoute.boardX + (col + 0.5) * lightRoute.cell,
            y: lightRoute.boardY + (row + 0.5) * lightRoute.cell,
          };
          points.push(center);
          direction = turnLightDirection(direction, lightRoute.grid[row][col]);
        }
        lightRoute.beam = points;
        lightRoute.solved = solved;
        return solved;
      }

      function resetLightRoute() {
        const config = getDifficulty();
        state.choosingGame = false;
        state.mode = "playing";
        state.elapsed = 0;
        state.timeLeft = config.runTime;
        state.score = 0;
        state.combo = 1;
        state.maxCombo = 1;
        state.shield = config.shield;
        state.energy = 0;
        state.screenShake = 0;
        state.burst = 0;
        lightRoute.solution = cloneLightSolution();
        lightRoute.grid = lightRoute.solution.map((row) => row.slice());
        [[2, 1], [3, 3], [1, 2]].forEach(([row, col]) => {
          lightRoute.grid[row][col] = lightRoute.grid[row][col] === 1 ? 2 : 1;
        });
        lightRoute.moves = 0;
        lightRoute.solved = false;
        particles.length = 0;
        ripples.length = 0;
        traceLightRoute();
        modal.hidden = true;
        resultStats.hidden = true;
        resumeButton.hidden = true;
        startButton.textContent = getActiveGame().replayLabel;
        playTone(520, 0.08, "sine", 0.04);
        updateHud();
      }

      function rotateLightCell(clientX, clientY) {
        if (state.mode !== "playing") {
          return;
        }
        getLightBoardMetrics();
        const col = Math.floor((clientX - lightRoute.boardX) / lightRoute.cell);
        const row = Math.floor((clientY - lightRoute.boardY) / lightRoute.cell);
        if (row < 0 || row >= lightRoute.size || col < 0 || col >= lightRoute.size) {
          return;
        }
        if (lightRoute.grid[row][col] === 0) {
          playTone(190, 0.035, "sine", 0.018);
          return;
        }
        lightRoute.grid[row][col] = lightRoute.grid[row][col] === 1 ? 2 : 1;
        lightRoute.moves += 1;
        state.combo = Math.max(1, lightRoute.moves);
        state.maxCombo = Math.max(state.maxCombo, state.combo);
        createRipple(
          lightRoute.boardX + (col + 0.5) * lightRoute.cell,
          lightRoute.boardY + (row + 0.5) * lightRoute.cell,
          "#4ef0d1",
          42,
        );
        playTone(460 + lightRoute.moves * 12, 0.045, "triangle", 0.025);
        if (traceLightRoute()) {
          const config = getDifficulty();
          state.score = Math.max(50, Math.round((state.timeLeft * 14 + 180 - lightRoute.moves * 12) * config.scoreMultiplier));
          state.energy = 100;
          addParticles(
            lightRoute.boardX + lightRoute.size * lightRoute.cell,
            lightRoute.boardY + (lightRoute.targetRow + 0.5) * lightRoute.cell,
            "#ffd166",
            28,
            1.4,
          );
          finishRun("win");
        }
        updateHud();
      }

      function updateLightRoute(dt) {
        state.elapsed += dt;
        state.timeLeft -= dt;
        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const particle = particles[i];
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 1 - dt * 2.4;
          particle.vy *= 1 - dt * 2.4;
          particle.life -= dt;
          if (particle.life <= 0) {
            particles.splice(i, 1);
          }
        }
        for (let i = ripples.length - 1; i >= 0; i -= 1) {
          const ripple = ripples[i];
          ripple.radius += (ripple.maxRadius - ripple.radius) * clamp(dt * 7, 0, 1);
          ripple.life -= dt;
          if (ripple.life <= 0) {
            ripples.splice(i, 1);
          }
        }
        if (state.timeLeft <= 0) {
          finishRun("over");
        }
      }

      function drawLightRoute(time) {
        if (!lightRoute.grid.length) {
          lightRoute.solution = cloneLightSolution();
          lightRoute.grid = lightRoute.solution.map((row) => row.slice());
          traceLightRoute();
        }
        drawBackground(time);
        getLightBoardMetrics();
        const total = lightRoute.cell * lightRoute.size;
        ctx.save();
        ctx.fillStyle = "rgba(5, 15, 21, 0.42)";
        ctx.strokeStyle = "rgba(183, 241, 255, 0.22)";
        ctx.lineWidth = 1;
        ctx.fillRect(lightRoute.boardX - 12, lightRoute.boardY - 12, total + 24, total + 24);
        ctx.strokeRect(lightRoute.boardX - 12, lightRoute.boardY - 12, total + 24, total + 24);

        for (let row = 0; row < lightRoute.size; row += 1) {
          for (let col = 0; col < lightRoute.size; col += 1) {
            const x = lightRoute.boardX + col * lightRoute.cell;
            const y = lightRoute.boardY + row * lightRoute.cell;
            ctx.fillStyle = "rgba(255, 255, 255, 0.045)";
            ctx.strokeStyle = "rgba(183, 241, 255, 0.16)";
            ctx.lineWidth = 1;
            ctx.fillRect(x, y, lightRoute.cell, lightRoute.cell);
            ctx.strokeRect(x, y, lightRoute.cell, lightRoute.cell);
            const tile = lightRoute.grid[row][col];
            if (tile) {
              ctx.save();
              ctx.translate(x + lightRoute.cell * 0.5, y + lightRoute.cell * 0.5);
              ctx.rotate(tile === 1 ? -Math.PI / 4 : Math.PI / 4);
              ctx.lineWidth = Math.max(5, lightRoute.cell * 0.1);
              ctx.lineCap = "round";
              ctx.shadowBlur = 12;
              ctx.shadowColor = "#4ef0d1";
              ctx.strokeStyle = "#b5fff1";
              ctx.beginPath();
              ctx.moveTo(-lightRoute.cell * 0.28, 0);
              ctx.lineTo(lightRoute.cell * 0.28, 0);
              ctx.stroke();
              ctx.restore();
            }
          }
        }

        ctx.save();
        ctx.shadowBlur = 18;
        ctx.shadowColor = "#ffd166";
        ctx.strokeStyle = "#ffd166";
        ctx.lineWidth = 4;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.beginPath();
        lightRoute.beam.forEach((point, index) => {
          if (index === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        });
        ctx.stroke();
        ctx.restore();

        const startY = lightRoute.boardY + (lightRoute.startRow + 0.5) * lightRoute.cell;
        const targetY = lightRoute.boardY + (lightRoute.targetRow + 0.5) * lightRoute.cell;
        ctx.fillStyle = "#4ef0d1";
        ctx.beginPath();
        ctx.moveTo(lightRoute.boardX - 24, startY);
        ctx.lineTo(lightRoute.boardX - 6, startY - 11);
        ctx.lineTo(lightRoute.boardX - 6, startY + 11);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = lightRoute.solved ? "#ffd166" : "#ff6f91";
        ctx.beginPath();
        ctx.arc(lightRoute.boardX + total + 18, targetY, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        drawEffects();
      }

      function isSimpleGame() {
        return SIMPLE_GAME_IDS.has(state.activeGame);
      }

      function resetSimpleGame() {
        const config = getDifficulty();
        state.choosingGame = false;
        state.mode = "playing";
        state.elapsed = 0;
        state.timeLeft = config.runTime;
        state.score = 0;
        state.combo = 1;
        state.maxCombo = 1;
        state.shield = config.shield;
        state.energy = 0;
        state.screenShake = 0;
        state.burst = 0;
        simpleGame.objects.length = 0;
        simpleGame.nodes.length = 0;
        simpleGame.shots.length = 0;
        simpleGame.x = state.w * 0.5;
        simpleGame.y = state.h * 0.5;
        simpleGame.vx = 0;
        simpleGame.vy = 0;
        simpleGame.targetX = simpleGame.x;
        simpleGame.targetY = simpleGame.y;
        simpleGame.angle = -Math.PI / 2;
        simpleGame.spawn = 0.8;
        simpleGame.timer = 0;
        simpleGame.gauge = 45;
        simpleGame.progress = 0;
        simpleGame.selected = 0;
        simpleGame.level = 1;
        simpleGame.pulling = false;
        simpleGame.thrusting = false;
        particles.length = 0;
        ripples.length = 0;

        if (state.activeGame === "moon-courier") {
          simpleGame.x = state.w * 0.26;
          simpleGame.y = state.h * 0.23;
          simpleGame.vx = 60;
          simpleGame.vy = 0;
          simpleGame.targetX = state.w * 0.72;
          simpleGame.targetY = state.h * 0.72;
          simpleGame.gauge = 100;
        } else if (state.activeGame === "starport-sorter") {
          simpleGame.selected = 0;
          simpleGame.spawn = 0.2;
        } else if (state.activeGame === "reactor-tune") {
          simpleGame.angle = -Math.PI / 2;
          simpleGame.spawn = 0.5;
          simpleGame.gauge = 0;
        } else if (state.activeGame === "fog-radar") {
          simpleGame.x = state.w * 0.2;
          simpleGame.y = state.h * 0.72;
          simpleGame.targetX = simpleGame.x;
          simpleGame.targetY = simpleGame.y;
          simpleGame.gauge = 1.4;
          for (let i = 0; i < 7; i += 1) {
            simpleGame.objects.push({
              type: i < 4 ? "beacon" : "noise",
              x: rand(state.w * 0.22, state.w * 0.86),
              y: rand(state.h * 0.25, state.h * 0.78),
              r: i < 4 ? 12 : 18,
              pulse: rand(0, Math.PI * 2),
            });
          }
        } else if (state.activeGame === "rift-angler") {
          simpleGame.gauge = 44;
          simpleGame.progress = 0;
          simpleGame.x = state.w * 0.22;
          simpleGame.y = state.h * 0.35;
          simpleGame.targetX = state.w * 0.74;
          simpleGame.targetY = state.h * 0.56;
        } else if (state.activeGame === "core-garden") {
          simpleGame.nodes.push({ x: state.w * 0.5, y: state.h * 0.52, r: 24, core: true, pulse: 0 });
          simpleGame.spawn = 1.0;
        } else if (state.activeGame === "parts-hunter") {
          simpleGame.x = state.w * 0.5;
          simpleGame.y = state.h * 0.56;
          simpleGame.targetX = simpleGame.x;
          simpleGame.targetY = simpleGame.y;
          simpleGame.level = 1;
          simpleGame.spawn = 0.5;
        }

        modal.hidden = true;
        resultStats.hidden = true;
        resumeButton.hidden = true;
        startButton.textContent = getActiveGame().replayLabel;
        playTone(520, 0.08, "triangle", 0.04);
        updateHud();
      }

      function simpleDamage(amount, x, y) {
        state.shield -= amount;
        state.combo = 1;
        state.screenShake = 9;
        createRipple(x, y, "#ff4d6d", 74);
        addParticles(x, y, "#ff4d6d", 14, 1.2);
        playTone(150, 0.12, "sawtooth", 0.05);
        if (state.shield <= 0) {
          finishRun("over");
          return true;
        }
        return false;
      }

      function simpleCollect(points, x, y, color = "#ffd166") {
        const config = getDifficulty();
        state.score += points * state.combo * config.scoreMultiplier;
        state.combo = Math.min(config.comboCap, state.combo + 1);
        state.maxCombo = Math.max(state.maxCombo, state.combo);
        state.energy = clamp(state.energy + points * config.energyGain * 0.7, 0, 100);
        state.shield = clamp(state.shield + config.shieldGain, 0, config.shield);
        createRipple(x, y, color, 48);
        addParticles(x, y, color, 10, 1);
        playTone(color === "#ffd166" ? 720 : 560, 0.05, "sine", 0.028);
      }

      function updateSimpleGame(dt) {
        const config = getDifficulty();
        state.elapsed += dt;
        state.timeLeft -= dt;
        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        state.burst = Math.max(0, state.burst - dt);
        simpleGame.timer += dt;

        if (state.activeGame === "moon-courier") {
          const thrust = simpleGame.thrusting || keys.has("ArrowUp") || keys.has("w") || keys.has("W");
          const left = keys.has("ArrowLeft") || keys.has("a") || keys.has("A");
          const right = keys.has("ArrowRight") || keys.has("d") || keys.has("D");
          simpleGame.vy += 230 * dt;
          if (thrust && simpleGame.gauge > 0) {
            simpleGame.vy -= 520 * dt;
            simpleGame.gauge = Math.max(0, simpleGame.gauge - 22 * dt);
            addParticles(simpleGame.x, simpleGame.y + 18, "#ffd166", 1, 0.5);
          }
          if (left) simpleGame.vx -= 220 * dt;
          if (right) simpleGame.vx += 220 * dt;
          simpleGame.vx *= 1 - dt * 0.5;
          simpleGame.x += simpleGame.vx * dt;
          simpleGame.y += simpleGame.vy * dt;
          simpleGame.x = clamp(simpleGame.x, 26, state.w - 26);
          if (simpleGame.y > simpleGame.targetY) {
            const speed = Math.hypot(simpleGame.vx, simpleGame.vy);
            const onPad = Math.abs(simpleGame.x - simpleGame.targetX) < 54;
            simpleGame.y = simpleGame.targetY;
            if (onPad && speed < 150) {
              state.score = Math.round((state.timeLeft * 18 + simpleGame.gauge * 4 + 260) * config.scoreMultiplier);
              finishRun("win");
              return;
            }
            simpleGame.vy = -Math.abs(simpleGame.vy) * 0.28;
            simpleGame.vx *= 0.5;
            if (simpleDamage(config.damage, simpleGame.x, simpleGame.y - 20)) return;
          }
        } else if (state.activeGame === "starport-sorter") {
          simpleGame.spawn -= dt;
          if (simpleGame.spawn <= 0) {
            simpleGame.objects.push({
              type: Math.floor(rand(0, 3)),
              x: -40,
              y: state.h * 0.42,
              speed: (150 + state.elapsed * 2.5) * config.hazardSpeed,
              pulse: 0,
            });
            simpleGame.spawn = Math.max(0.55, 1.05 * config.hazardInterval - state.elapsed * 0.004);
          }
          for (let i = simpleGame.objects.length - 1; i >= 0; i -= 1) {
            const box = simpleGame.objects[i];
            box.x += box.speed * dt;
            box.pulse += dt * 5;
            if (box.x > state.w * 0.68) {
              if (simpleGame.selected === box.type) {
                simpleCollect(20, box.x, box.y, ["#4ef0d1", "#ffd166", "#ff6f91"][box.type]);
              } else if (simpleDamage(config.damage * 0.6, box.x, box.y)) {
                return;
              }
              simpleGame.objects.splice(i, 1);
            }
          }
        } else if (state.activeGame === "reactor-tune") {
          if (keys.has("ArrowLeft") || keys.has("a") || keys.has("A")) simpleGame.angle -= dt * 3.2;
          if (keys.has("ArrowRight") || keys.has("d") || keys.has("D")) simpleGame.angle += dt * 3.2;
          simpleGame.spawn -= dt;
          if (simpleGame.spawn <= 0) {
            simpleGame.objects.push({
              angle: rand(-Math.PI, Math.PI),
              radius: Math.min(state.w, state.h) * 0.44,
              speed: (95 + state.elapsed * 1.2) * config.hazardSpeed,
              type: Math.random() > 0.18 ? "energy" : "unstable",
            });
            simpleGame.spawn = Math.max(0.42, 0.82 * config.hazardInterval);
          }
          for (let i = simpleGame.objects.length - 1; i >= 0; i -= 1) {
            const orb = simpleGame.objects[i];
            orb.radius -= orb.speed * dt;
            if (orb.radius < 78) {
              const diff = Math.abs(Math.atan2(Math.sin(orb.angle - simpleGame.angle), Math.cos(orb.angle - simpleGame.angle)));
              if (diff < 0.36 && orb.type === "energy") {
                simpleCollect(18, state.w * 0.5 + Math.cos(orb.angle) * 85, state.h * 0.52 + Math.sin(orb.angle) * 85, "#4ef0d1");
              } else if (diff < 0.36 && orb.type === "unstable") {
                if (simpleDamage(config.damage, state.w * 0.5, state.h * 0.52)) return;
              } else if (orb.type === "energy" && simpleDamage(config.damage * 0.55, state.w * 0.5, state.h * 0.52)) {
                return;
              }
              simpleGame.objects.splice(i, 1);
            }
          }
        } else if (state.activeGame === "fog-radar") {
          updatePointerChase(dt, 250);
          simpleGame.gauge = Math.max(0.42, simpleGame.gauge - dt * 0.18);
          for (let i = simpleGame.objects.length - 1; i >= 0; i -= 1) {
            const obj = simpleGame.objects[i];
            obj.pulse += dt * 4;
            const distance = Math.hypot(obj.x - simpleGame.x, obj.y - simpleGame.y);
            if (distance < obj.r + 16) {
              if (obj.type === "beacon") {
                simpleCollect(26, obj.x, obj.y, "#ffd166");
                simpleGame.objects.splice(i, 1);
              } else if (simpleDamage(config.damage, obj.x, obj.y)) {
                return;
              } else {
                obj.x = rand(state.w * 0.24, state.w * 0.88);
                obj.y = rand(state.h * 0.25, state.h * 0.8);
              }
            }
          }
          if (!simpleGame.objects.some((obj) => obj.type === "beacon")) {
            state.score += Math.round(state.timeLeft * 10 * config.scoreMultiplier);
            finishRun("win");
            return;
          }
        } else if (state.activeGame === "rift-angler") {
          const pulling = simpleGame.pulling || keys.has(" ") || keys.has("Spacebar") || keys.has("ArrowUp") || keys.has("w") || keys.has("W");
          simpleGame.gauge += (pulling ? 38 : -24) * dt + Math.sin(state.elapsed * 4) * dt * 7;
          if (simpleGame.gauge > 100 || simpleGame.gauge < 0) {
            simpleGame.gauge = clamp(simpleGame.gauge, 12, 88);
            simpleGame.progress = Math.max(0, simpleGame.progress - 18);
            if (simpleDamage(config.damage, state.w * 0.5, state.h * 0.58)) return;
          }
          if (pulling && simpleGame.gauge > 32 && simpleGame.gauge < 76) {
            simpleGame.progress += dt * (24 + state.combo * 0.8);
            state.score += dt * 10 * config.scoreMultiplier;
            state.combo = Math.min(config.comboCap, state.combo + (dt > 0 ? 0.015 : 0));
          } else {
            simpleGame.progress = Math.max(0, simpleGame.progress - dt * 5);
          }
          state.energy = clamp(simpleGame.progress, 0, 100);
          if (simpleGame.progress >= 100) {
            state.score += Math.round((state.timeLeft * 13 + 420) * config.scoreMultiplier);
            finishRun("win");
            return;
          }
        } else if (state.activeGame === "core-garden") {
          simpleGame.spawn -= dt;
          if (simpleGame.spawn <= 0) {
            const side = Math.floor(rand(0, 4));
            simpleGame.objects.push({
              type: "spore",
              x: side === 0 ? -30 : side === 1 ? state.w + 30 : rand(0, state.w),
              y: side === 2 ? -30 : side === 3 ? state.h + 30 : rand(120, state.h - 30),
              r: 14,
              speed: (42 + state.elapsed * 0.9) * config.hazardSpeed,
            });
            simpleGame.spawn = Math.max(0.55, 1.1 * config.hazardInterval);
          }
          for (const node of simpleGame.nodes) node.pulse += dt * 4;
          for (let i = simpleGame.objects.length - 1; i >= 0; i -= 1) {
            const spore = simpleGame.objects[i];
            const core = simpleGame.nodes[0];
            const angle = Math.atan2(core.y - spore.y, core.x - spore.x);
            spore.x += Math.cos(angle) * spore.speed * dt;
            spore.y += Math.sin(angle) * spore.speed * dt;
            let removed = false;
            for (const node of simpleGame.nodes) {
              if (!node.core && Math.hypot(node.x - spore.x, node.y - spore.y) < 58) {
                simpleCollect(8, spore.x, spore.y, "#94e06b");
                simpleGame.objects.splice(i, 1);
                removed = true;
                break;
              }
            }
            if (!removed && Math.hypot(core.x - spore.x, core.y - spore.y) < 30) {
              simpleGame.objects.splice(i, 1);
              if (simpleDamage(config.damage * 0.55, core.x, core.y)) return;
            }
          }
        } else if (state.activeGame === "parts-hunter") {
          updatePointerChase(dt, 280);
          simpleGame.spawn -= dt;
          if (simpleGame.spawn <= 0) {
            const makePart = Math.random() > 0.45;
            const side = Math.floor(rand(0, 4));
            simpleGame.objects.push({
              type: makePart ? "part" : "drone",
              x: side === 0 ? -30 : side === 1 ? state.w + 30 : rand(0, state.w),
              y: side === 2 ? -30 : side === 3 ? state.h + 30 : rand(100, state.h - 30),
              r: makePart ? 11 : 16,
              speed: (makePart ? 35 : 70 + state.elapsed) * config.hazardSpeed,
              pulse: 0,
            });
            simpleGame.spawn = Math.max(0.34, 0.75 * config.hazardInterval);
          }
          for (let i = simpleGame.objects.length - 1; i >= 0; i -= 1) {
            const obj = simpleGame.objects[i];
            obj.pulse += dt * 5;
            if (obj.type === "drone") {
              const angle = Math.atan2(simpleGame.y - obj.y, simpleGame.x - obj.x);
              obj.x += Math.cos(angle) * obj.speed * dt;
              obj.y += Math.sin(angle) * obj.speed * dt;
              if (Math.hypot(obj.x - simpleGame.x, obj.y - simpleGame.y) < obj.r + 16) {
                simpleGame.objects.splice(i, 1);
                if (simpleDamage(config.damage, simpleGame.x, simpleGame.y)) return;
              } else if (Math.hypot(obj.x - simpleGame.x, obj.y - simpleGame.y) < 72 + simpleGame.level * 10) {
                simpleGame.timer += dt;
                if (simpleGame.timer > Math.max(0.18, 0.45 - simpleGame.level * 0.03)) {
                  simpleGame.timer = 0;
                  simpleGame.objects.splice(i, 1);
                  simpleCollect(10, obj.x, obj.y, "#4ef0d1");
                }
              }
            } else if (Math.hypot(obj.x - simpleGame.x, obj.y - simpleGame.y) < obj.r + 18) {
              simpleGame.level = Math.min(6, simpleGame.level + 1);
              simpleCollect(24, obj.x, obj.y, "#ffd166");
              simpleGame.objects.splice(i, 1);
            }
          }
        }

        state.best = Math.max(state.best, Math.round(state.score));
        if (state.timeLeft <= 0) {
          finishRun("win");
        }
      }

      function updatePointerChase(dt, speed) {
        let dx = 0;
        let dy = 0;
        if (keys.has("ArrowLeft") || keys.has("a") || keys.has("A")) dx -= 1;
        if (keys.has("ArrowRight") || keys.has("d") || keys.has("D")) dx += 1;
        if (keys.has("ArrowUp") || keys.has("w") || keys.has("W")) dy -= 1;
        if (keys.has("ArrowDown") || keys.has("s") || keys.has("S")) dy += 1;
        if (dx || dy) {
          const len = Math.hypot(dx, dy) || 1;
          simpleGame.targetX = simpleGame.x + (dx / len) * speed;
          simpleGame.targetY = simpleGame.y + (dy / len) * speed;
        }
        simpleGame.x += (simpleGame.targetX - simpleGame.x) * clamp(dt * 6, 0, 1);
        simpleGame.y += (simpleGame.targetY - simpleGame.y) * clamp(dt * 6, 0, 1);
        simpleGame.x = clamp(simpleGame.x, 24, state.w - 24);
        simpleGame.y = clamp(simpleGame.y, 90, state.h - 24);
      }

      function activateSimpleBurst() {
        if (state.mode !== "playing" || state.energy < 100) {
          return;
        }
        const config = getDifficulty();
        state.energy = 0;
        state.burst = 0.45;
        state.screenShake = 7;
        const cx = state.activeGame === "reactor-tune" ? state.w * 0.5 : simpleGame.x;
        const cy = state.activeGame === "reactor-tune" ? state.h * 0.52 : simpleGame.y;
        createRipple(cx, cy, "#ffd166", 230);
        for (let i = simpleGame.objects.length - 1; i >= 0; i -= 1) {
          const obj = simpleGame.objects[i];
          if (obj.type !== "beacon" && obj.type !== "part" && Math.hypot((obj.x || cx) - cx, (obj.y || cy) - cy) < 260) {
            simpleGame.objects.splice(i, 1);
            state.score += 8 * state.combo * config.scoreMultiplier;
          }
        }
        playTone(620, 0.1, "triangle", 0.055);
        updateHud();
      }

      function handleSimplePointer(x, y, pressed) {
        if (state.activeGame === "moon-courier") {
          simpleGame.thrusting = pressed;
          simpleGame.targetX = x;
        } else if (state.activeGame === "starport-sorter") {
          simpleGame.selected = clamp(Math.floor((x / state.w) * 3), 0, 2);
        } else if (state.activeGame === "reactor-tune") {
          simpleGame.angle = Math.atan2(y - state.h * 0.52, x - state.w * 0.5);
        } else if (state.activeGame === "rift-angler") {
          simpleGame.pulling = pressed;
        } else if (state.activeGame === "core-garden" && pressed) {
          const tooClose = simpleGame.nodes.some((node) => Math.hypot(node.x - x, node.y - y) < 42);
          if (!tooClose && y > 110) {
            simpleGame.nodes.push({ x, y, r: 16, core: false, pulse: 0 });
            state.score += 6;
            state.energy = clamp(state.energy + 6, 0, 100);
            createRipple(x, y, "#94e06b", 50);
          }
        } else {
          simpleGame.targetX = x;
          simpleGame.targetY = y;
        }
      }

      function drawSimpleGame(time) {
        if (simpleGame.x <= 0) {
          simpleGame.x = state.w * 0.5;
          simpleGame.y = state.h * 0.55;
          simpleGame.targetX = simpleGame.x;
          simpleGame.targetY = simpleGame.y;
          if (state.activeGame === "core-garden" && !simpleGame.nodes.length) {
            simpleGame.nodes.push({ x: state.w * 0.5, y: state.h * 0.52, r: 24, core: true, pulse: 0 });
          }
        }
        drawBackground(time);
        if (state.activeGame === "moon-courier") {
          drawMoonCourier();
        } else if (state.activeGame === "starport-sorter") {
          drawStarportSorter();
        } else if (state.activeGame === "reactor-tune") {
          drawReactorTune();
        } else if (state.activeGame === "fog-radar") {
          drawFogRadar();
        } else if (state.activeGame === "rift-angler") {
          drawRiftAngler();
        } else if (state.activeGame === "core-garden") {
          drawCoreGarden();
        } else if (state.activeGame === "parts-hunter") {
          drawPartsHunter();
        }
        drawEffects();
      }

      function drawMoonCourier() {
        const padY = simpleGame.targetY;
        ctx.save();
        ctx.strokeStyle = "rgba(183, 241, 255, 0.22)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, padY);
        ctx.lineTo(state.w, padY);
        ctx.stroke();
        ctx.fillStyle = "#94e06b";
        ctx.fillRect(simpleGame.targetX - 58, padY - 7, 116, 10);
        ctx.fillStyle = "rgba(255, 209, 102, 0.18)";
        ctx.fillRect(simpleGame.targetX - 42, padY - 22, 84, 15);
        ctx.translate(simpleGame.x, simpleGame.y);
        ctx.shadowBlur = 18;
        ctx.shadowColor = "#4ef0d1";
        ctx.fillStyle = "#eafffb";
        ctx.strokeStyle = "#4ef0d1";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(22, 18);
        ctx.lineTo(-22, 18);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        if (simpleGame.thrusting) {
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.moveTo(-9, 20);
          ctx.lineTo(0, 42);
          ctx.lineTo(9, 20);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawStarportSorter() {
        const colors = ["#4ef0d1", "#ffd166", "#ff6f91"];
        ctx.save();
        ctx.strokeStyle = "rgba(183, 241, 255, 0.22)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(20, state.h * 0.42);
        ctx.lineTo(state.w - 20, state.h * 0.42);
        ctx.stroke();
        for (const box of simpleGame.objects) {
          ctx.fillStyle = colors[box.type];
          ctx.shadowBlur = 14;
          ctx.shadowColor = colors[box.type];
          ctx.fillRect(box.x - 17, box.y - 17, 34, 34);
        }
        for (let i = 0; i < 3; i += 1) {
          const x = state.w * (0.22 + i * 0.28);
          ctx.fillStyle = simpleGame.selected === i ? colors[i] : "rgba(255,255,255,0.07)";
          ctx.strokeStyle = colors[i];
          ctx.lineWidth = 2;
          ctx.fillRect(x - 54, state.h * 0.72, 108, 54);
          ctx.strokeRect(x - 54, state.h * 0.72, 108, 54);
        }
        ctx.restore();
      }

      function drawReactorTune() {
        const cx = state.w * 0.5;
        const cy = state.h * 0.52;
        ctx.save();
        ctx.strokeStyle = "rgba(78, 240, 209, 0.36)";
        ctx.lineWidth = 2;
        for (let r = 90; r <= Math.min(state.w, state.h) * 0.42; r += 58) {
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.strokeStyle = "#ffd166";
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.arc(cx, cy, 92, simpleGame.angle - 0.32, simpleGame.angle + 0.32);
        ctx.stroke();
        ctx.fillStyle = "#4ef0d1";
        for (const orb of simpleGame.objects) {
          const x = cx + Math.cos(orb.angle) * orb.radius;
          const y = cy + Math.sin(orb.angle) * orb.radius;
          ctx.fillStyle = orb.type === "unstable" ? "#ff6f91" : "#4ef0d1";
          ctx.shadowBlur = 14;
          ctx.shadowColor = ctx.fillStyle;
          ctx.beginPath();
          ctx.arc(x, y, 12, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawFogRadar() {
        ctx.save();
        for (const obj of simpleGame.objects) {
          const visible = Math.hypot(obj.x - simpleGame.x, obj.y - simpleGame.y) < 150 + simpleGame.gauge * 80;
          ctx.globalAlpha = visible ? 1 : 0.12;
          ctx.fillStyle = obj.type === "beacon" ? "#ffd166" : "#ff6f91";
          ctx.beginPath();
          ctx.arc(obj.x, obj.y, obj.r + Math.sin(obj.pulse) * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.fillStyle = "rgba(0, 0, 0, 0.46)";
        ctx.fillRect(0, 0, state.w, state.h);
        const scan = ctx.createRadialGradient(simpleGame.x, simpleGame.y, 10, simpleGame.x, simpleGame.y, 190 + simpleGame.gauge * 70);
        scan.addColorStop(0, "rgba(78, 240, 209, 0)");
        scan.addColorStop(1, "rgba(78, 240, 209, 0.18)");
        ctx.fillStyle = scan;
        ctx.beginPath();
        ctx.arc(simpleGame.x, simpleGame.y, 190 + simpleGame.gauge * 70, 0, Math.PI * 2);
        ctx.fill();
        drawSimplePlayer("#4ef0d1");
        ctx.restore();
      }

      function drawRiftAngler() {
        ctx.save();
        const rodX = state.w * 0.18;
        const rodY = state.h * 0.34;
        const fishX = state.w * (0.58 + simpleGame.progress * 0.002);
        const fishY = state.h * 0.58 + Math.sin(state.elapsed * 4) * 18;
        ctx.strokeStyle = simpleGame.gauge > 76 || simpleGame.gauge < 32 ? "#ff6f91" : "#ffd166";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(rodX, rodY);
        ctx.lineTo(fishX, fishY);
        ctx.stroke();
        ctx.fillStyle = "#4ef0d1";
        ctx.fillRect(rodX - 8, rodY - 42, 14, 82);
        ctx.fillStyle = "#ffd166";
        ctx.beginPath();
        ctx.ellipse(fishX, fishY, 34, 18, Math.sin(state.elapsed) * 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(state.w * 0.22, state.h * 0.78, state.w * 0.56, 18);
        ctx.fillStyle = "#94e06b";
        ctx.fillRect(state.w * 0.22 + state.w * 0.56 * 0.32, state.h * 0.78, state.w * 0.56 * 0.44, 18);
        ctx.fillStyle = "#ff6f91";
        ctx.fillRect(state.w * 0.22 + state.w * 0.56 * (simpleGame.gauge / 100) - 4, state.h * 0.765, 8, 48);
        ctx.fillStyle = "#ffd166";
        ctx.fillRect(state.w * 0.22, state.h * 0.84, state.w * 0.56 * clamp(simpleGame.progress / 100, 0, 1), 10);
        ctx.restore();
      }

      function drawCoreGarden() {
        ctx.save();
        for (let i = 0; i < simpleGame.nodes.length; i += 1) {
          for (let j = i + 1; j < simpleGame.nodes.length; j += 1) {
            const a = simpleGame.nodes[i];
            const b = simpleGame.nodes[j];
            if (Math.hypot(a.x - b.x, a.y - b.y) < 170) {
              ctx.strokeStyle = "rgba(148, 224, 107, 0.26)";
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }
        }
        for (const node of simpleGame.nodes) {
          ctx.fillStyle = node.core ? "#ffd166" : "#94e06b";
          ctx.shadowBlur = 16;
          ctx.shadowColor = ctx.fillStyle;
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.core ? 24 : 15, 0, Math.PI * 2);
          ctx.fill();
        }
        for (const spore of simpleGame.objects) {
          ctx.fillStyle = "#ff6f91";
          ctx.shadowBlur = 14;
          ctx.shadowColor = "#ff6f91";
          ctx.beginPath();
          ctx.arc(spore.x, spore.y, spore.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawPartsHunter() {
        ctx.save();
        for (const obj of simpleGame.objects) {
          ctx.fillStyle = obj.type === "part" ? "#ffd166" : "#ff6f91";
          ctx.shadowBlur = 14;
          ctx.shadowColor = ctx.fillStyle;
          ctx.beginPath();
          ctx.arc(obj.x, obj.y, obj.r + Math.sin(obj.pulse) * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.strokeStyle = "rgba(78, 240, 209, 0.36)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(simpleGame.x, simpleGame.y, 72 + simpleGame.level * 10, 0, Math.PI * 2);
        ctx.stroke();
        drawSimplePlayer("#4ef0d1");
        ctx.restore();
      }

      function drawSimplePlayer(color) {
        ctx.save();
        ctx.translate(simpleGame.x, simpleGame.y);
        ctx.shadowBlur = 18;
        ctx.shadowColor = color;
        ctx.fillStyle = "#eafffb";
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.lineTo(-14, -13);
        ctx.lineTo(-8, 0);
        ctx.lineTo(-14, 13);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function spawnGem() {
        const config = getDifficulty();
        const size = rand(9, 15);
        const side = Math.floor(rand(0, 4));
        let x;
        let y;
        if (side === 0) {
          x = rand(30, state.w - 30);
          y = -30;
        } else if (side === 1) {
          x = state.w + 30;
          y = rand(80, state.h - 50);
        } else if (side === 2) {
          x = rand(30, state.w - 30);
          y = state.h + 30;
        } else {
          x = -30;
          y = rand(80, state.h - 50);
        }
        const targetX = state.w * rand(0.25, 0.75);
        const targetY = state.h * rand(0.28, 0.78);
        const angle = Math.atan2(targetY - y, targetX - x);
        const speed = (rand(38, 78) + state.elapsed * 0.25) * config.gemSpeed;
        gems.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size,
          spin: rand(-2.2, 2.2),
          angle: rand(0, Math.PI * 2),
          value: Math.random() > 0.82 ? 28 : 14,
          hue: Math.random() > 0.42 ? "aqua" : "gold",
        });
      }

      function spawnHazard() {
        const config = getDifficulty();
        const side = Math.floor(rand(0, 4));
        let x;
        let y;
        if (side === 0) {
          x = rand(0, state.w);
          y = -50;
        } else if (side === 1) {
          x = state.w + 50;
          y = rand(60, state.h - 30);
        } else if (side === 2) {
          x = rand(0, state.w);
          y = state.h + 50;
        } else {
          x = -50;
          y = rand(60, state.h - 30);
        }
        const leadX = player.x + rand(-120, 120);
        const leadY = player.y + rand(-90, 90);
        const angle = Math.atan2(leadY - y, leadX - x);
        const speed = (rand(70, 120) + state.elapsed * 0.55) * config.hazardSpeed;
        hazards.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: rand(14, 23),
          spin: rand(-3.6, 3.6),
          angle: rand(0, Math.PI * 2),
          pulse: rand(0, Math.PI * 2),
        });
      }

      function addParticles(x, y, color, count, power = 1) {
        for (let i = 0; i < count; i += 1) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(40, 190) * power;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(0.35, 0.9),
            maxLife: 0,
            size: rand(2, 5),
            color,
          });
          particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
        }
      }

      function createRipple(x, y, color, size = 50) {
        ripples.push({
          x,
          y,
          color,
          radius: 4,
          maxRadius: size,
          life: 0.5,
          maxLife: 0.5,
        });
      }

      function activateBurst() {
        if (state.activeGame === "signal-dash") {
          activateSignalBurst();
          return;
        }
        if (state.activeGame === "mag-rail-run") {
          activateMagBurst();
          return;
        }
        if (isSimpleGame()) {
          activateSimpleBurst();
          return;
        }
        if (state.mode !== "playing" || state.energy < 100) {
          return;
        }
        const config = getDifficulty();
        state.energy = 0;
        state.burst = 0.45;
        state.screenShake = Math.max(state.screenShake, 7);
        createRipple(player.x, player.y, "#ffd166", 260);
        for (let i = hazards.length - 1; i >= 0; i -= 1) {
          const hazard = hazards[i];
          const distance = Math.hypot(hazard.x - player.x, hazard.y - player.y);
          if (distance < 260) {
            addParticles(hazard.x, hazard.y, "#ffd166", 14, 1.3);
            hazards.splice(i, 1);
            state.score += 9 * state.combo * config.scoreMultiplier;
          }
        }
        playTone(520, 0.1, "triangle", 0.055);
        playTone(850, 0.16, "sine", 0.035);
        updateHud();
      }

      function updatePlayer(dt) {
        let dx = 0;
        let dy = 0;
        if (keys.has("ArrowLeft") || keys.has("a") || keys.has("A")) dx -= 1;
        if (keys.has("ArrowRight") || keys.has("d") || keys.has("D")) dx += 1;
        if (keys.has("ArrowUp") || keys.has("w") || keys.has("W")) dy -= 1;
        if (keys.has("ArrowDown") || keys.has("s") || keys.has("S")) dy += 1;
        if (dx || dy) {
          const len = Math.hypot(dx, dy) || 1;
          player.tx += (dx / len) * 420 * dt;
          player.ty += (dy / len) * 420 * dt;
          state.pointerActive = false;
        }
        player.tx = clamp(player.tx, 22, state.w - 22);
        player.ty = clamp(player.ty, 70, state.h - 22);
        const smoothing = state.pointerActive ? 12 : 8;
        player.x += (player.tx - player.x) * clamp(smoothing * dt, 0, 1);
        player.y += (player.ty - player.y) * clamp(smoothing * dt, 0, 1);
        player.invulnerable = Math.max(0, player.invulnerable - dt);
        player.trail.unshift({ x: player.x, y: player.y, life: 1 });
        if (player.trail.length > 18) {
          player.trail.pop();
        }
        for (const point of player.trail) {
          point.life -= dt * 2.6;
        }
      }

      function updateEntities(dt) {
        const config = getDifficulty();
        state.elapsed += dt;
        state.timeLeft -= dt;
        state.spawnGem -= dt;
        state.spawnHazard -= dt;
        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        state.burst = Math.max(0, state.burst - dt);

        const gemRate = Math.max(0.32, 0.82 - state.elapsed * 0.006) * config.gemInterval;
        const hazardRate = Math.max(0.42, 1.2 - state.elapsed * 0.009) * config.hazardInterval;
        if (state.spawnGem <= 0) {
          spawnGem();
          state.spawnGem = gemRate;
        }
        if (state.spawnHazard <= 0) {
          spawnHazard();
          if (state.elapsed > config.extraHazardAt && Math.random() > 1 - config.extraHazardChance) {
            spawnHazard();
          }
          state.spawnHazard = hazardRate;
        }

        for (let i = gems.length - 1; i >= 0; i -= 1) {
          const gem = gems[i];
          gem.x += gem.vx * dt;
          gem.y += gem.vy * dt;
          gem.angle += gem.spin * dt;
          const distance = Math.hypot(gem.x - player.x, gem.y - player.y);
          if (distance < gem.size + player.r + 3) {
            const bonus = gem.value * state.combo * config.scoreMultiplier;
            state.score += bonus;
            state.combo = Math.min(config.comboCap, state.combo + 1);
            state.maxCombo = Math.max(state.maxCombo, state.combo);
            state.energy = clamp(state.energy + gem.value * config.energyGain, 0, 100);
            state.shield = clamp(state.shield + config.shieldGain, 0, config.shield);
            addParticles(gem.x, gem.y, gem.hue === "gold" ? "#ffd166" : "#4ef0d1", 12, 1);
            createRipple(gem.x, gem.y, gem.hue === "gold" ? "#ffd166" : "#4ef0d1", 52);
            playTone(gem.hue === "gold" ? 740 : 560, 0.055, "sine", 0.028);
            gems.splice(i, 1);
          } else if (gem.x < -90 || gem.x > state.w + 90 || gem.y < -90 || gem.y > state.h + 90) {
            gems.splice(i, 1);
          }
        }

        for (let i = hazards.length - 1; i >= 0; i -= 1) {
          const hazard = hazards[i];
          hazard.x += hazard.vx * dt;
          hazard.y += hazard.vy * dt;
          hazard.angle += hazard.spin * dt;
          hazard.pulse += dt * 5;
          const distance = Math.hypot(hazard.x - player.x, hazard.y - player.y);
          if (distance < hazard.r + player.r && player.invulnerable <= 0) {
            player.invulnerable = 1.05;
            state.shield -= config.damage;
            state.combo = 1;
            state.screenShake = 11;
            addParticles(hazard.x, hazard.y, "#ff4d6d", 22, 1.5);
            createRipple(hazard.x, hazard.y, "#ff4d6d", 86);
            hazards.splice(i, 1);
            playTone(140, 0.16, "sawtooth", 0.055);
            if (state.shield <= 0) {
              finishRun("over");
              return;
            }
          } else if (hazard.x < -120 || hazard.x > state.w + 120 || hazard.y < -120 || hazard.y > state.h + 120) {
            hazards.splice(i, 1);
          }
        }

        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const particle = particles[i];
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 1 - dt * 2.4;
          particle.vy *= 1 - dt * 2.4;
          particle.life -= dt;
          if (particle.life <= 0) {
            particles.splice(i, 1);
          }
        }

        for (let i = ripples.length - 1; i >= 0; i -= 1) {
          const ripple = ripples[i];
          ripple.radius += (ripple.maxRadius - ripple.radius) * clamp(dt * 7, 0, 1);
          ripple.life -= dt;
          if (ripple.life <= 0) {
            ripples.splice(i, 1);
          }
        }

        state.best = Math.max(state.best, Math.round(state.score));
        if (state.timeLeft <= 0) {
          finishRun("win");
        }
      }

      function drawBackground(time) {
        const gradient = ctx.createLinearGradient(0, 0, state.w, state.h);
        gradient.addColorStop(0, "#061018");
        gradient.addColorStop(0.42, "#073226");
        gradient.addColorStop(1, "#1a1022");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, state.w, state.h);

        ctx.save();
        ctx.globalAlpha = 0.38;
        for (let row = 0; row < 9; row += 1) {
          const y = (state.h * 0.12) + row * (state.h * 0.11);
          ctx.beginPath();
          for (let x = -40; x <= state.w + 40; x += 24) {
            const wave = Math.sin(x * 0.014 + time * 0.0018 + row) * (9 + row * 0.8);
            if (x === -40) {
              ctx.moveTo(x, y + wave);
            } else {
              ctx.lineTo(x, y + wave);
            }
          }
          ctx.lineWidth = row % 2 ? 1 : 1.6;
          ctx.strokeStyle = row % 3 === 0 ? "rgba(78, 240, 209, 0.24)" : "rgba(255, 209, 102, 0.13)";
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.44;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        ctx.lineWidth = 1;
        const grid = 56;
        const offset = (time * 0.016) % grid;
        for (let x = -grid + offset; x < state.w + grid; x += grid) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x - state.h * 0.22, state.h);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawGem(gem) {
        ctx.save();
        ctx.translate(gem.x, gem.y);
        ctx.rotate(gem.angle);
        const color = gem.hue === "gold" ? "#ffd166" : "#4ef0d1";
        ctx.shadowBlur = 18;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.78)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(0, -gem.size);
        ctx.lineTo(gem.size * 0.72, 0);
        ctx.lineTo(0, gem.size);
        ctx.lineTo(-gem.size * 0.72, 0);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
        ctx.fillRect(-1.2, -gem.size * 0.65, 2.4, gem.size * 1.3);
        ctx.restore();
      }

      function drawHazard(hazard) {
        const pulse = 1 + Math.sin(hazard.pulse) * 0.08;
        ctx.save();
        ctx.translate(hazard.x, hazard.y);
        ctx.rotate(hazard.angle);
        ctx.scale(pulse, pulse);
        ctx.shadowBlur = 22;
        ctx.shadowColor = "#ff4d6d";
        ctx.strokeStyle = "#ff6f91";
        ctx.fillStyle = "rgba(255, 77, 109, 0.18)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < 8; i += 1) {
          const a = i * Math.PI / 4;
          const radius = i % 2 ? hazard.r * 0.48 : hazard.r;
          const x = Math.cos(a) * radius;
          const y = Math.sin(a) * radius;
          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, hazard.r * 0.34, 0, Math.PI * 2);
        ctx.fillStyle = "#ff4d6d";
        ctx.fill();
        ctx.restore();
      }

      function drawPlayer(time) {
        for (let i = player.trail.length - 1; i >= 0; i -= 1) {
          const point = player.trail[i];
          if (point.life <= 0) {
            continue;
          }
          ctx.globalAlpha = point.life * 0.26;
          ctx.fillStyle = "#4ef0d1";
          ctx.beginPath();
          ctx.arc(point.x, point.y, player.r * point.life, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        const angle = Math.atan2(player.ty - player.y, player.tx - player.x);
        const lowAlpha = player.invulnerable > 0 && Math.sin(time * 0.025) <= -0.15;

        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(angle);
        ctx.globalAlpha = lowAlpha ? 0.48 : 1;
        ctx.shadowBlur = state.burst > 0 ? 30 : 18;
        ctx.shadowColor = state.burst > 0 ? "#ffd166" : "#4ef0d1";
        ctx.fillStyle = "#eafffb";
        ctx.strokeStyle = "#4ef0d1";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.lineTo(-14, -13);
        ctx.lineTo(-8, 0);
        ctx.lineTo(-14, 13);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#ff6f91";
        ctx.beginPath();
        ctx.moveTo(-9, -7);
        ctx.lineTo(-24, 0);
        ctx.lineTo(-9, 7);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#061018";
        ctx.beginPath();
        ctx.arc(5, 0, 4.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (state.pointerActive && state.mode === "playing") {
          ctx.save();
          ctx.globalAlpha = 0.4;
          ctx.strokeStyle = "#b5fff1";
          ctx.lineWidth = 1.4;
          ctx.setLineDash([5, 8]);
          ctx.beginPath();
          ctx.arc(player.tx, player.ty, 18 + Math.sin(time * 0.006) * 3, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawEffects() {
        for (const ripple of ripples) {
          const alpha = clamp(ripple.life / ripple.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha * 0.62;
          ctx.strokeStyle = ripple.color;
          ctx.lineWidth = 3 * alpha + 0.5;
          ctx.beginPath();
          ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        for (const particle of particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        if (state.burst > 0) {
          const progress = 1 - state.burst / 0.45;
          ctx.save();
          ctx.globalAlpha = (1 - progress) * 0.26;
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.arc(player.x, player.y, 240 * progress, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function render(time = 0) {
        if (state.activeGame === "signal-dash") {
          ctx.save();
          const shake = state.screenShake;
          if (shake > 0) {
            ctx.translate(rand(-shake, shake), rand(-shake, shake));
          }
          drawSignalDash(time);
          ctx.restore();
          return;
        }
        if (state.activeGame === "mag-rail-run") {
          ctx.save();
          const shake = state.screenShake;
          if (shake > 0) {
            ctx.translate(rand(-shake, shake), rand(-shake, shake));
          }
          drawMagRun(time);
          ctx.restore();
          return;
        }
        if (state.activeGame === "light-route") {
          ctx.save();
          const shake = state.screenShake;
          if (shake > 0) {
            ctx.translate(rand(-shake, shake), rand(-shake, shake));
          }
          drawLightRoute(time);
          ctx.restore();
          return;
        }
        if (isSimpleGame()) {
          ctx.save();
          const shake = state.screenShake;
          if (shake > 0) {
            ctx.translate(rand(-shake, shake), rand(-shake, shake));
          }
          drawSimpleGame(time);
          ctx.restore();
          return;
        }
        ctx.save();
        const shake = state.screenShake;
        if (shake > 0) {
          ctx.translate(rand(-shake, shake), rand(-shake, shake));
        }
        drawBackground(time);
        for (const gem of gems) {
          drawGem(gem);
        }
        for (const hazard of hazards) {
          drawHazard(hazard);
        }
        drawEffects();
        drawPlayer(time);
        ctx.restore();

        if (state.mode !== "playing") {
          ctx.save();
          ctx.globalAlpha = 0.28;
          drawPlayer(time);
          ctx.restore();
        }
      }

      function tick(time) {
        const dt = Math.min(0.033, (time - state.lastTime) / 1000 || 0);
        state.lastTime = time;
        if (state.mode === "playing") {
          if (state.activeGame === "signal-dash") {
            updateSignalDash(dt);
          } else if (state.activeGame === "mag-rail-run") {
            updateMagRun(dt);
          } else if (state.activeGame === "light-route") {
            updateLightRoute(dt);
          } else if (isSimpleGame()) {
            updateSimpleGame(dt);
          } else {
            updatePlayer(dt);
            updateEntities(dt);
          }
          updateHud();
        }
        render(time);
        requestAnimationFrame(tick);
      }

      function setPointer(event) {
        const rect = canvas.getBoundingClientRect();
        if (state.activeGame === "signal-dash") {
          const y = event.clientY - rect.top;
          let nearest = 0;
          let nearestDistance = Infinity;
          for (let lane = 0; lane < 3; lane += 1) {
            const distance = Math.abs(y - getSignalLaneY(lane));
            if (distance < nearestDistance) {
              nearest = lane;
              nearestDistance = distance;
            }
          }
          setSignalLane(nearest);
          state.pointerActive = true;
          return;
        }
        if (state.activeGame === "mag-rail-run") {
          const y = event.clientY - rect.top;
          if (y < state.h * 0.5) {
            magJump();
          } else {
            setMagDucking(true);
          }
          state.pointerActive = true;
          return;
        }
        if (state.activeGame === "light-route") {
          if (event.buttons || event.type === "pointerdown") {
            rotateLightCell(event.clientX - rect.left, event.clientY - rect.top);
          }
          state.pointerActive = true;
          return;
        }
        if (isSimpleGame()) {
          handleSimplePointer(event.clientX - rect.left, event.clientY - rect.top, Boolean(event.buttons) || event.type === "pointerdown");
          state.pointerActive = true;
          return;
        }
        player.tx = clamp(event.clientX - rect.left, 18, state.w - 18);
        player.ty = clamp(event.clientY - rect.top, 70, state.h - 18);
        state.pointerActive = true;
      }

      canvas.addEventListener("pointerdown", (event) => {
        canvas.setPointerCapture(event.pointerId);
        setPointer(event);
        ensureAudio();
      });
      canvas.addEventListener("pointermove", (event) => {
        if (state.activeGame !== "neon-tide" && !isSimpleGame() && !event.buttons) {
          return;
        }
        if (event.buttons || event.pointerType === "mouse") {
          setPointer(event);
        }
      });
      canvas.addEventListener("pointerup", (event) => {
        try {
          canvas.releasePointerCapture(event.pointerId);
        } catch (error) {
          // Pointer capture may already be released by the browser.
        }
        if (state.activeGame === "mag-rail-run") {
          setMagDucking(false);
        }
        if (isSimpleGame()) {
          simpleGame.thrusting = false;
          simpleGame.pulling = false;
        }
      });

      window.addEventListener("keydown", (event) => {
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", " ", "Spacebar"].includes(event.key)) {
          event.preventDefault();
        }
        keys.add(event.key);
        if (event.key === " " || event.key === "Spacebar") {
          activateBurst();
        }
        if (state.activeGame === "signal-dash" && state.mode === "playing") {
          if (event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
            setSignalLane(signalDash.targetLane - 1);
          }
          if (event.key === "ArrowDown" || event.key === "s" || event.key === "S") {
            setSignalLane(signalDash.targetLane + 1);
          }
        }
        if (state.activeGame === "mag-rail-run" && state.mode === "playing") {
          if (event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
            magJump();
          }
          if (event.key === "ArrowDown" || event.key === "s" || event.key === "S") {
            setMagDucking(true);
          }
        }
        if (isSimpleGame() && state.mode === "playing") {
          if (state.activeGame === "starport-sorter") {
            if (event.key === "1") simpleGame.selected = 0;
            if (event.key === "2") simpleGame.selected = 1;
            if (event.key === "3") simpleGame.selected = 2;
          }
          if (state.activeGame === "moon-courier" && (event.key === " " || event.key === "Spacebar")) {
            simpleGame.thrusting = true;
          }
          if (state.activeGame === "rift-angler" && (event.key === " " || event.key === "Spacebar")) {
            simpleGame.pulling = true;
          }
        }
        if (event.key === "p" || event.key === "P" || event.key === "Escape") {
          state.mode === "playing" ? pauseGame() : resumeGame();
        }
      });
      window.addEventListener("keyup", (event) => {
        keys.delete(event.key);
        if (state.activeGame === "mag-rail-run" && (event.key === "ArrowDown" || event.key === "s" || event.key === "S")) {
          setMagDucking(false);
        }
        if (state.activeGame === "moon-courier" && (event.key === " " || event.key === "Spacebar")) {
          simpleGame.thrusting = false;
        }
        if (state.activeGame === "rift-angler" && (event.key === " " || event.key === "Spacebar")) {
          simpleGame.pulling = false;
        }
      });
      window.addEventListener("resize", resizeCanvas);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          pauseGame();
        }
      });

      startButton.addEventListener("click", () => {
        if (state.choosingGame) {
          hideGamePicker();
          return;
        }
        state.showingHelp = false;
        ensureAudio();
        resetRun();
      });
      helpButton.addEventListener("click", showHelp);
      helpBackButton.addEventListener("click", hideHelp);
      gameSelectButton.addEventListener("click", showGamePicker);
      gamePicker.addEventListener("click", (event) => {
        const option = event.target.closest("[data-game]");
        if (!option || option.disabled) {
          return;
        }
        setActiveGame(option.dataset.game);
      });
      difficultyButtons.forEach((button) => {
        button.addEventListener("click", () => setDifficulty(button.dataset.difficulty));
      });
      mainMenuButton.addEventListener("click", returnToMainMenu);
      resumeButton.addEventListener("click", resumeGame);
      pauseButton.addEventListener("click", () => {
        if (state.mode === "playing") {
          pauseGame();
        } else if (state.mode === "paused") {
          resumeGame();
        }
      });
      soundButton.addEventListener("click", () => {
        state.audioOn = !state.audioOn;
        if (state.audioOn) {
          playTone(500, 0.08, "sine", 0.03);
        }
        updateHud();
      });
      burstButton.addEventListener("click", activateBurst);

      resizeCanvas();
      setModal("menu");
      updateHud();
      render();
      requestAnimationFrame((time) => {
        state.lastTime = time;
        requestAnimationFrame(tick);
      });
    })();
  </script>
</body>
</html>
