<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>霓虹潮汐</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6fbff;
      --muted: #9cb7bf;
      --panel: rgba(8, 17, 24, 0.72);
      --panel-strong: rgba(10, 22, 30, 0.9);
      --line: rgba(183, 241, 255, 0.22);
      --aqua: #4ef0d1;
      --coral: #ff6f91;
      --gold: #ffd166;
      --leaf: #94e06b;
      --deep: #061018;
      --danger: #ff4d6d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--deep);
      color: var(--ink);
      font-family:
        "Segoe UI",
        "Microsoft JhengHei",
        system-ui,
        sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .game-shell {
      position: fixed;
      inset: 0;
      min-width: 320px;
      background:
        linear-gradient(180deg, rgba(255, 111, 145, 0.06), transparent 30%),
        linear-gradient(135deg, #07151e 0%, #09251f 48%, #15101d 100%);
      isolation: isolate;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 4;
      display: grid;
      grid-template-columns: repeat(4, minmax(86px, 1fr)) auto;
      gap: 8px;
      align-items: start;
      padding: clamp(10px, 2vw, 18px);
      pointer-events: none;
    }

    .status-pill,
    .tool-button {
      min-height: 44px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
    }

    .status-pill {
      display: grid;
      gap: 2px;
      align-content: center;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 8px;
    }

    .status-pill small {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .status-pill strong {
      overflow: hidden;
      color: var(--ink);
      font-size: clamp(17px, 2.3vw, 24px);
      line-height: 1.05;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-row {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .tool-button {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      padding: 0;
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      transition:
        transform 140ms ease,
        border-color 140ms ease,
        background 140ms ease,
        opacity 140ms ease;
    }

    .tool-button:hover {
      transform: translateY(-1px);
      border-color: rgba(78, 240, 209, 0.52);
      background: rgba(13, 33, 38, 0.86);
    }

    .tool-button:disabled {
      cursor: not-allowed;
      opacity: 0.38;
      transform: none;
    }

    .burst-button.ready {
      border-color: rgba(255, 209, 102, 0.8);
      color: #15100a;
      background: linear-gradient(135deg, var(--gold), #fff2ad);
    }

    .shield-track {
      position: absolute;
      left: clamp(10px, 2vw, 18px);
      right: clamp(10px, 2vw, 18px);
      bottom: clamp(12px, 2vw, 20px);
      z-index: 4;
      height: 8px;
      overflow: hidden;
      border: 1px solid rgba(183, 241, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .shield-track span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--aqua), var(--leaf), var(--gold));
      transform-origin: left;
      transition: transform 140ms ease;
    }

    .modal {
      position: absolute;
      z-index: 6;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 32px);
      background: rgba(3, 8, 12, 0.38);
    }

    .modal[hidden] {
      display: none;
    }

    .dialog {
      width: min(500px, 100%);
      border: 1px solid rgba(183, 241, 255, 0.26);
      border-radius: 8px;
      padding: clamp(20px, 5vw, 34px);
      background: var(--panel-strong);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 8vw, 72px);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .dialog p {
      margin: 14px 0 0;
      color: #d5e7ec;
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.6;
    }

    .help-panel {
      display: grid;
      gap: 8px;
      margin-top: 18px;
    }

    .help-panel[hidden] {
      display: none;
    }

    .help-item {
      border: 1px solid rgba(183, 241, 255, 0.18);
      border-radius: 8px;
      padding: 10px 12px;
      color: #d5e7ec;
      background: rgba(255, 255, 255, 0.06);
      font-size: 14px;
      line-height: 1.45;
    }

    .dialog-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .primary-button,
    .secondary-button {
      min-height: 46px;
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 800;
      transition:
        transform 140ms ease,
        border-color 140ms ease,
        background 140ms ease;
    }

    .primary-button {
      color: #061018;
      background: linear-gradient(135deg, var(--aqua), #b5fff1);
    }

    .secondary-button {
      color: var(--ink);
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.08);
    }

    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-1px);
    }

    .difficulty-panel {
      margin-top: 18px;
    }

    .difficulty-panel[hidden] {
      display: none;
    }

    .panel-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .segmented-control {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(183, 241, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .difficulty-button {
      min-width: 0;
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      transition:
        border-color 140ms ease,
        background 140ms ease,
        color 140ms ease;
    }

    .difficulty-button:hover {
      border-color: rgba(78, 240, 209, 0.36);
      background: rgba(255, 255, 255, 0.07);
    }

    .difficulty-button.active {
      color: #061018;
      border-color: rgba(78, 240, 209, 0.8);
      background: linear-gradient(135deg, var(--aqua), #d7fff7);
    }

    .game-picker {
      display: grid;
      gap: 8px;
      margin-top: 18px;
      max-height: min(42vh, 390px);
      overflow: auto;
      padding-right: 4px;
      overscroll-behavior: contain;
      scrollbar-color: rgba(78, 240, 209, 0.55) rgba(255, 255, 255, 0.08);
      scrollbar-width: thin;
    }

    .game-picker[hidden] {
      display: none;
    }

    .game-option {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 54px;
      width: 100%;
      border: 1px solid rgba(183, 241, 255, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.06);
      text-align: left;
      cursor: pointer;
      transition:
        border-color 140ms ease,
        background 140ms ease,
        transform 140ms ease;
    }

    .game-option:hover {
      transform: translateY(-1px);
      border-color: rgba(78, 240, 209, 0.38);
      background: rgba(255, 255, 255, 0.09);
    }

    .game-option:disabled {
      cursor: not-allowed;
      opacity: 0.56;
      transform: none;
    }

    .game-option.active {
      border-color: rgba(78, 240, 209, 0.72);
      background: rgba(78, 240, 209, 0.12);
    }

    .game-name {
      display: block;
      overflow: hidden;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .game-option:disabled .game-name {
      color: #d7e7eb;
    }

    .game-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 18px;
    }

    .stats-grid[hidden] {
      display: none;
    }

    .stat-box {
      min-width: 0;
      border: 1px solid rgba(183, 241, 255, 0.18);
      border-radius: 8px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.06);
    }

    .stat-box small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .stat-box strong {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      font-size: 18px;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr)) auto;
      }

      .hud .status-pill:nth-child(3),
      .hud .status-pill:nth-child(4) {
        display: none;
      }

      .tool-row {
        grid-column: 3;
        grid-row: 1 / span 2;
        flex-direction: column;
      }

      .dialog-actions {
        flex-direction: column;
      }

      .primary-button,
      .secondary-button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tool-row {
        grid-column: 1 / -1;
        grid-row: 2;
        flex-direction: row;
        justify-content: flex-end;
      }

      .tool-button {
        width: 40px;
        height: 40px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="霓虹潮汐遊戲">
    <canvas id="gameCanvas"></canvas>

    <section class="hud" aria-label="遊戲狀態">
      <div class="status-pill">
        <small>分數</small>
        <strong id="scoreText">0</strong>
      </div>
      <div class="status-pill">
        <small>時間</small>
        <strong id="timeText">75.0</strong>
      </div>
      <div class="status-pill">
        <small>連擊</small>
        <strong id="comboText">x1</strong>
      </div>
      <div class="status-pill">
        <small>紀錄</small>
        <strong id="bestText">0</strong>
      </div>
      <div class="tool-row">
        <button class="tool-button burst-button" id="burstButton" type="button" aria-label="釋放脈衝" title="釋放脈衝" disabled>*</button>
        <button class="tool-button" id="soundButton" type="button" aria-label="音效" title="音效">♪</button>
        <button class="tool-button" id="pauseButton" type="button" aria-label="暫停" title="暫停">II</button>
      </div>
    </section>

    <div class="shield-track" aria-hidden="true">
      <span id="shieldBar"></span>
    </div>

    <section class="modal" id="modal">
      <div class="dialog" role="dialog" aria-labelledby="modalTitle" aria-describedby="modalBody">
        <p class="eyebrow" id="modalKicker">Web Arcade</p>
        <h1 id="modalTitle">霓虹潮汐</h1>
        <p id="modalBody">收集光核、避開裂波，在城市海面撐過 75 秒。</p>
        <div class="help-panel" id="helpPanel" aria-label="遊玩說明" hidden></div>
        <div class="difficulty-panel" id="difficultyPanel" aria-label="難易度">
          <p class="panel-label" id="difficultyLabel">難易度</p>
          <div class="segmented-control" role="group" aria-label="選擇難易度">
            <button class="difficulty-button" type="button" data-difficulty="easy">悠遊</button>
            <button class="difficulty-button" type="button" data-difficulty="normal">標準</button>
            <button class="difficulty-button" type="button" data-difficulty="hard">浪尖</button>
          </div>
        </div>
        <div class="game-picker" id="gamePicker" aria-label="選擇遊戲" hidden>
          <button class="game-option active" type="button" data-game="neon-tide">
            <span>
              <span class="game-name">霓虹潮汐</span>
            </span>
            <span class="game-meta">目前遊戲</span>
          </button>
          <button class="game-option" type="button" data-game="signal-dash">
            <span>
              <span class="game-name">訊號衝刺</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="mag-rail-run">
            <span>
              <span class="game-name">磁軌逃亡</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="light-route">
            <span>
              <span class="game-name">光路修補師</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="moon-courier">
            <span>
              <span class="game-name">月面快遞</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="starport-sorter">
            <span>
              <span class="game-name">星港分揀員</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="reactor-tune">
            <span>
              <span class="game-name">反應爐調頻</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="fog-radar">
            <span>
              <span class="game-name">迷霧雷達</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="rift-angler">
            <span>
              <span class="game-name">裂隙釣手</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="core-garden">
            <span>
              <span class="game-name">核心花園</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
          <button class="game-option" type="button" data-game="parts-hunter">
            <span>
              <span class="game-name">零件獵人</span>
            </span>
            <span class="game-meta">可遊玩</span>
          </button>
        </div>
        <div class="stats-grid" id="resultStats" hidden>
          <div class="stat-box">
            <small>本局分數</small>
            <strong id="resultScore">0</strong>
          </div>
          <div class="stat-box">
            <small>最高連擊</small>
            <strong id="resultCombo">x1</strong>
          </div>
          <div class="stat-box">
            <small>最佳紀錄</small>
            <strong id="resultBest">0</strong>
          </div>
          <div class="stat-box">
            <small>難易度</small>
            <strong id="resultDifficulty">標準</strong>
          </div>
        </div>
        <div class="dialog-actions">
          <button class="primary-button" id="startButton" type="button">開始航行</button>
          <button class="secondary-button" id="helpButton" type="button">遊玩說明</button>
          <button class="secondary-button" id="helpBackButton" type="button" hidden>返回</button>
          <button class="secondary-button" id="gameSelectButton" type="button">選擇其他遊戲</button>
          <button class="secondary-button" id="mainMenuButton" type="button" hidden>返回主選單</button>
          <button class="secondary-button" id="resumeButton" type="button" hidden>繼續</button>
        </div>
      </div>
    </section>
  </main>

      const scoreText = document.getElementById("scoreText");

        }

        try {
          const stored = localStorage.getItem(getBestStorageKey(game, difficulty));
          if (stored !== null) {

          if (game === "neon-tide" && difficulty === "normal") {
            return Number(localStorage.getItem(LEGACY_STORAGE_KEY) || 0);
          }
          return 0;
        } catch (error) {
          return 0;
        }

        writeBestScore(state.activeGame, state.difficulty, state.best);
        resultScore.textContent = formatScore(state.score);
        resultCombo.textContent = state.activeGame === "light-route" ? String(lightRoute.moves) : "x" + Math.floor(state.maxCombo);
        resultBest.textContent = formatScore(state.best);
        resultDifficulty.textContent = getDifficulty().label;
        setModal(type);
        updateHud();
        playTone(type === "win" ? 660 : 180, 0.22, type === "win" ? "triangle" : "sawtooth", 0.05);
      }

      function pauseGame() {
        if (state.mode !== "playing") {
          return;
        }
        state.mode = "paused";
        setModal("pause");
        updateHud();
      }

      function returnToMainMenu() {
        state.mode = "menu";
        state.choosingGame = true;
        state.initialGamePicker = true;
        state.showingHelp = false;
        state.pointerActive = false;
        state.burst = 0;
        state.screenShake = 0;
        keys.clear();
        simpleGame.thrusting = false;
        simpleGame.pulling = false;
        setModal("menu");
        updateHud();
      }

      function resumeGame() {
        if (state.mode !== "paused") {
          return;
        }
        state.mode = "playing";
        modal.hidden = true;
        state.lastTime = performance.now();
        updateHud();
      }

      function ensureAudio() {
        if (!state.audio && state.audioOn) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            state.audio = new AudioContext();
          }
        }
        if (state.audio && state.audio.state === "suspended") {
          state.audio.resume();
        }
      }

      function playTone(freq, duration, type = "sine", gain = 0.035) {
        if (!state.audioOn) {
          return;
        }
        ensureAudio();
        if (!state.audio) {
          return;
        }
        const now = state.audio.currentTime;
        const osc = state.audio.createOscillator();
        const amp = state.audio.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        amp.gain.setValueAtTime(0, now);
        amp.gain.linearRampToValueAtTime(gain, now + 0.01);
        amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(amp);
        amp.connect(state.audio.destination);
        osc.start(now);
        osc.stop(now + duration + 0.02);
      }

      function getSignalLaneY(lane) {
        const top = state.h * 0.31;
        const gap = Math.min(150, state.h * 0.18);
        return top + lane * gap;
      }

      function setSignalLane(lane) {
        signalDash.targetLane = clamp(lane, 0, 2);
      }

      function resetSignalRun() {
        const config = getDifficulty();
        state.choosingGame = false;
        state.mode = "playing";
        state.elapsed = 0;
        state.timeLeft = config.runTime;
        state.score = 0;
        state.combo = 1;
        state.maxCombo = 1;
        state.shield = config.shield;
        state.energy = 0;
        state.spawnGem = 0;
        state.spawnHazard = 0;
        state.screenShake = 0;
        state.burst = 0;
        signalDash.lane = 1;
        signalDash.targetLane = 1;
        signalDash.playerX = state.w * 0.22;
        signalDash.playerY = getSignalLaneY(1);
        signalDash.spawn = 0.35;
        signalDash.flow = 0;
        signalDash.objects.length = 0;
        particles.length = 0;
        ripples.length = 0;
        modal.hidden = true;
        resultStats.hidden = true;
        resumeButton.hidden = true;
        startButton.textContent = getActiveGame().replayLabel;
        playTone(520, 0.08, "triangle", 0.04);
        updateHud();
      }

      function spawnSignalWave() {
        const config = getDifficulty();
        const hazardLane = Math.floor(rand(0, 3));
        const speed = (260 + state.elapsed * 4.2) * config.hazardSpeed;
        signalDash.objects.push({
          type: "hazard",
          lane: hazardLane,
          x: state.w + 58,
          w: rand(34, 48),
          h: 34,
          speed,
          pulse: rand(0, Math.PI * 2),
          scored: false,
        });

        const openLanes = [0, 1, 2].filter((lane) => lane !== hazardLane);
        const packetLane = openLanes[Math.floor(rand(0, openLanes.length))];
        if (Math.random() > 0.22) {
          signalDash.objects.push({
            type: Math.random() > 0.78 ? "boost" : "packet",
            lane: packetLane,
            x: state.w + rand(120, 210),
            w: 22,
            h: 22,
            speed: speed * rand(0.88, 1.08),
            pulse: rand(0, Math.PI * 2),
            scored: false,
          });
        }
      }

      function updateSignalDash(dt) {
        const config = getDifficulty();
        state.elapsed += dt;
        state.timeLeft -= dt;
        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        state.burst = Math.max(0, state.burst - dt);
        signalDash.flow += dt * (180 + state.elapsed * 4);
        signalDash.playerX = state.w * 0.22;
        signalDash.lane += (signalDash.targetLane - signalDash.lane) * clamp(dt * 14, 0, 1);
        signalDash.playerY = getSignalLaneY(signalDash.lane);

        signalDash.spawn -= dt;
        if (signalDash.spawn <= 0) {
          spawnSignalWave();
          signalDash.spawn = Math.max(0.42, (0.92 - state.elapsed * 0.006) * config.hazardInterval);
        }

        for (let i = signalDash.objects.length - 1; i >= 0; i -= 1) {
          const object = signalDash.objects[i];
          object.x -= object.speed * dt;
          object.pulse += dt * 6;
          const objectY = getSignalLaneY(object.lane);
          const sameLane = Math.abs(signalDash.playerY - objectY) < 38;
          const hitX = Math.abs(signalDash.playerX - object.x) < object.w * 0.5 + 22;

          if (sameLane && hitX) {
            if (object.type === "hazard") {
              state.shield -= config.damage;
              state.combo = 1;
              state.screenShake = 10;
              createRipple(signalDash.playerX, signalDash.playerY, "#ff4d6d", 76);
              addParticles(signalDash.playerX, signalDash.playerY, "#ff4d6d", 18, 1.3);
              playTone(150, 0.14, "sawtooth", 0.052);
              signalDash.objects.splice(i, 1);
              if (state.shield <= 0) {
                finishRun("over");
                return;
              }
            } else {
              const base = object.type === "boost" ? 34 : 18;
              state.score += base * state.combo * config.scoreMultiplier;
              state.combo = Math.min(config.comboCap, state.combo + 1);
              state.maxCombo = Math.max(state.maxCombo, state.combo);
              state.energy = clamp(state.energy + base * config.energyGain, 0, 100);
              state.shield = clamp(state.shield + config.shieldGain, 0, config.shield);
              createRipple(object.x, objectY, object.type === "boost" ? "#ffd166" : "#4ef0d1", 54);
              addParticles(object.x, objectY, object.type === "boost" ? "#ffd166" : "#4ef0d1", 12, 1);
              playTone(object.type === "boost" ? 760 : 560, 0.055, "sine", 0.03);
              signalDash.objects.splice(i, 1);
            }
          } else if (object.x < -80) {
            if (object.type === "hazard" && !object.scored) {
              state.score += 3 * config.scoreMultiplier;
            }
            signalDash.objects.splice(i, 1);
          }
        }

        state.best = Math.max(state.best, Math.round(state.score));
        if (state.timeLeft <= 0) {
          finishRun(state.activeGame === "moon-courier" || state.activeGame === "rift-angler" ? "over" : "win");
        }
      }

      function activateSignalBurst() {
        if (state.mode !== "playing" || state.energy < 100) {
          return;
        }
        const config = getDifficulty();
        state.energy = 0;
        state.burst = 0.45;
        state.screenShake = Math.max(state.screenShake, 7);
        createRipple(signalDash.playerX, signalDash.playerY, "#ffd166", 210);
        for (let i = signalDash.objects.length - 1; i >= 0; i -= 1) {
          const object = signalDash.objects[i];
          if (object.type === "hazard" && object.x > signalDash.playerX - 50 && object.x < state.w + 80) {
            addParticles(object.x, getSignalLaneY(object.lane), "#ffd166", 12, 1.2);
            signalDash.objects.splice(i, 1);
            state.score += 8 * state.combo * config.scoreMultiplier;
          }
        }
        playTone(620, 0.1, "triangle", 0.055);
        updateHud();
      }

      function drawSignalDash(time) {
        if (signalDash.playerX <= 0 || state.mode === "menu") {
          signalDash.playerX = state.w * 0.22;
          signalDash.playerY = getSignalLaneY(signalDash.lane);
        }
        drawBackground(time);
        const laneStart = Math.max(24, state.w * 0.08);
        const laneEnd = state.w - 24;
        ctx.save();
        for (let lane = 0; lane < 3; lane += 1) {
          const y = getSignalLaneY(lane);
          ctx.lineWidth = lane === Math.round(signalDash.lane) ? 4 : 2;
          ctx.strokeStyle = lane === Math.round(signalDash.lane)
            ? "rgba(78, 240, 209, 0.7)"
            : "rgba(183, 241, 255, 0.2)";
          ctx.beginPath();
          ctx.moveTo(laneStart, y);
          ctx.lineTo(laneEnd, y);
          ctx.stroke();

          ctx.globalAlpha = 0.18;
          ctx.strokeStyle = "#ffd166";
          ctx.setLineDash([10, 20]);
          ctx.lineDashOffset = -signalDash.flow * 0.08;
          ctx.beginPath();
          ctx.moveTo(laneStart, y + 16);
          ctx.lineTo(laneEnd, y + 16);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;
        }
        ctx.restore();

        for (const object of signalDash.objects) {
          const y = getSignalLaneY(object.lane);
          ctx.save();
          ctx.translate(object.x, y);
          if (object.type === "hazard") {
            const pulse = 1 + Math.sin(object.pulse) * 0.1;
            ctx.scale(pulse, pulse);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff4d6d";
            ctx.fillStyle = "rgba(255, 77, 109, 0.24)";
            ctx.strokeStyle = "#ff6f91";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.rect(-object.w * 0.5, -object.h * 0.5, object.w, object.h);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "#ff4d6d";
            ctx.fillRect(-object.w * 0.24, -2, object.w * 0.48, 4);
          } else {
            const color = object.type === "boost" ? "#ffd166" : "#4ef0d1";
            ctx.rotate(Math.PI / 4 + object.pulse * 0.15);
            ctx.shadowBlur = 18;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.75)";
            ctx.lineWidth = 1.4;
            ctx.fillRect(-object.w * 0.5, -object.w * 0.5, object.w, object.w);
            ctx.strokeRect(-object.w * 0.5, -object.w * 0.5, object.w, object.w);
          }
          ctx.restore();
        }

        drawEffects();

        ctx.save();
        ctx.translate(signalDash.playerX, signalDash.playerY);
        ctx.shadowBlur = state.burst > 0 ? 28 : 18;
        ctx.shadowColor = state.burst > 0 ? "#ffd166" : "#4ef0d1";
        ctx.fillStyle = "#eafffb";
        ctx.strokeStyle = "#4ef0d1";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(24, 0);
        ctx.lineTo(-16, -18);
        ctx.lineTo(-7, 0);
        ctx.lineTo(-16, 18);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#061018";
        ctx.beginPath();
        ctx.arc(4, 0, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (state.burst > 0) {
          const progress = 1 - state.burst / 0.45;
          ctx.save();
          ctx.globalAlpha = (1 - progress) * 0.24;
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.arc(signalDash.playerX, signalDash.playerY, 210 * progress, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function resetMagRun() {
